<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Cache Search UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #f6f8fb;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    h2 { margin-top: 0; }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: black;
      color: white;
      border: none;
    }
    .meta {
      margin-top: 20px;
      padding: 14px;
      background: #f3f4f6;
      border-radius: 10px;
    }
    .articles {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }
    .article-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 8px;
      background: #111;
      color: white;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Semantic Cache Search UI</h2>
    <input id="queryInput" placeholder="Enter semantic query..." />
    <button onclick="sendQuery()">Search</button>
    <button onclick="getStats()">Get Cache Stats</button>
    <button onclick="clearCache()">Clear Cache</button>

    <div id="meta" class="meta">Response metadata will appear here...</div>
    <div id="articles" class="articles"></div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    async function sendQuery() {
      const query = document.getElementById('queryInput').value;
      const res = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });

      const data = await res.json();

      document.getElementById('meta').innerHTML = `
        <span class="badge">Cache Hit: ${data.cache_hit}</span>
        <span class="badge">Cluster: ${data.dominant_cluster}</span><br><br>
        Matched Query: ${data.matched_query || 'None'}<br>
        Similarity: ${data.similarity_score ?? 'N/A'}
      `;

      const articlesDiv = document.getElementById('articles');
      articlesDiv.innerHTML = '';

      if (Array.isArray(data.result)) {
        data.result.forEach((item, idx) => {
          const div = document.createElement('div');
          div.className = 'article-card';

          if (typeof item === 'object') {
            div.innerHTML = `
              <strong>Article ${idx + 1}</strong><br><br>
              <pre>${item.text || JSON.stringify(item, null, 2)}</pre>
            `;
          } else {
            div.innerHTML = `
              <strong>Document ID:</strong> ${item}
            `;
          }

          articlesDiv.appendChild(div);
        });
      }
    }

    async function getStats() {
      const res = await fetch(`${API}/cache/stats`);
      const data = await res.json();

      document.getElementById('meta').innerHTML = `
        Total Entries: ${data.total_entries}<br>
        Hit Count: ${data.hit_count}<br>
        Miss Count: ${data.miss_count}<br>
        Hit Rate: ${data.hit_rate}
      `;

      document.getElementById('articles').innerHTML = '';
    }

    async function clearCache() {
      const res = await fetch(`${API}/cache`, { method: 'DELETE' });
      const data = await res.json();

      document.getElementById('meta').innerHTML = data.message;
      document.getElementById('articles').innerHTML = '';
    }
  </script>
</body>
</html>
